name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf gitp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz gitp
          mv gitp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/
      - uses: actions/upload-artifact@v4
        with:
          name: gitp-${{ matrix.target }}
          path: gitp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: MerzoukeMansouri/homebrew-gitp
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
      - name: Update formula
        run: |
          VERSION=${{ github.ref_name }}
          BASE="https://github.com/MerzoukeMansouri/gitp/releases/download/${VERSION}"

          MAC_ARM_SHA=$(curl -sL "${BASE}/gitp-${VERSION}-aarch64-apple-darwin.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          MAC_X86_SHA=$(curl -sL "${BASE}/gitp-${VERSION}-x86_64-apple-darwin.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          LINUX_SHA=$(curl -sL "${BASE}/gitp-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" | shasum -a 256 | cut -d' ' -f1)

          mkdir -p Formula
          cat > Formula/gitp.rb << FORMULA
          class Gitp < Formula
            desc "K9s-style TUI for managing git operations across multiple repositories"
            homepage "https://github.com/MerzoukeMansouri/gitp"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/gitp-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              else
                url "${BASE}/gitp-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_X86_SHA}"
              end
            end

            on_linux do
              url "${BASE}/gitp-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${LINUX_SHA}"
            end

            def install
              bin.install "gitp"
            end

            test do
              system "#{bin}/gitp", "--help"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gitp.rb
          git commit -m "gitp ${VERSION}"
          git push
