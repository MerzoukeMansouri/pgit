name: Build & Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    needs: [lint, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  semantic-release:
    name: Semantic Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      published: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: cycjimmy/semantic-release-action@v4
        id: release
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-build:
    name: Release Build ${{ matrix.target }}
    needs: semantic-release
    if: needs.semantic-release.outputs.published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.semantic-release.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION=v${{ needs.semantic-release.outputs.version }}
          cd target/${{ matrix.target }}/release
          tar czf gitp-${VERSION}-${{ matrix.target }}.tar.gz gitp
          mv gitp-${VERSION}-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/
      - uses: actions/upload-artifact@v4
        with:
          name: gitp-${{ matrix.target }}
          path: gitp-v${{ needs.semantic-release.outputs.version }}-${{ matrix.target }}.tar.gz

  upload-assets:
    name: Upload Release Assets
    needs: [semantic-release, release-build]
    if: needs.semantic-release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.semantic-release.outputs.version }}
          files: "*.tar.gz"

  update-tap:
    name: Update Homebrew Tap
    needs: [semantic-release, upload-assets]
    if: needs.semantic-release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: MerzoukeMansouri/homebrew-gitp
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
      - name: Update formula
        run: |
          VERSION=v${{ needs.semantic-release.outputs.version }}
          BASE="https://github.com/MerzoukeMansouri/gitp/releases/download/${VERSION}"

          MAC_ARM_SHA=$(curl -sL "${BASE}/gitp-${VERSION}-aarch64-apple-darwin.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          MAC_X86_SHA=$(curl -sL "${BASE}/gitp-${VERSION}-x86_64-apple-darwin.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          LINUX_SHA=$(curl -sL "${BASE}/gitp-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" | shasum -a 256 | cut -d' ' -f1)

          mkdir -p Formula
          cat > Formula/gitp.rb << FORMULA
          class Gitp < Formula
            desc "K9s-style TUI for managing git operations across multiple repositories"
            homepage "https://github.com/MerzoukeMansouri/gitp"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/gitp-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              else
                url "${BASE}/gitp-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_X86_SHA}"
              end
            end

            on_linux do
              url "${BASE}/gitp-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${LINUX_SHA}"
            end

            def install
              bin.install "gitp"
            end

            test do
              system "#{bin}/gitp", "--help"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gitp.rb
          git commit -m "gitp ${VERSION}"
          git push
