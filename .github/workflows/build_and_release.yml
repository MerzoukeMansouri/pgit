name: Build & Release

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: MerzoukeMansouri/rust-github-reusable/.github/workflows/ci.yml@main

  release:
    needs: ci
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: MerzoukeMansouri/rust-github-reusable/.github/workflows/release.yml@main
    with:
      binary_name: pgit
      repo: MerzoukeMansouri/pgit
      formula_class: Pgit
      formula_desc: "K9s-style TUI for managing git operations across multiple repositories"
    secrets:
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
